dataset: CIFAR100
dataroot: /home/moshiling/data
model_type: resnet
model_name: resnet18
agent_type: svd_based
agent_name: svd_based
model_optimizer: Adam
first_split_size: 10
other_split_size: 10
batch_size: 32
workers: 2
schedule: [30, 60, 80]
model_lr: 0.0001
head_lr: 0.001
svd_lr: 0.00005
bn_lr: 0.0005
model_weight_decay: 0.00005
reg_coef: 100.0
gamma: 0.5
svd_thres: 10.0
projection_mode: sfcl_adns
sfcl_tau1: 10.0
sfcl_tau2: 10.0
sfcl_norm_projection: true
use_shared_lowrank: true
shared_subspace_mode: overlap_core
shared_rank_mode: avg
shared_rank_ratio: 0.9
shared_overlap_threshold: 0.5
safe_boost: 1.25
risk_shrink: 0.75
use_task_strength: true
alpha_min: 0.3
alpha_max: 0.9
alpha_schedule: linear
use_rho_t: false
rho_min: 1.0
rho_max: 1.0
use_intra_task_distill: true
teacher_warmup_epochs: 5
beta_distill: 0.5
tau_distill: 2.0
auto_select_gpu: true
gpuid: [-1]
min_gpu_free_gb: 10
seed: 0
print_freq: 10
output_root: results/adns_sfcl_port/runs
